name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate data
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Install cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          cloudflared version

      - name: Configure SSH
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          {
            echo "Host ${{ vars.DEPLOY_TUNNEL_HOST }}"
            echo '  ProxyCommand cloudflared access ssh --hostname %h'
            echo '  StrictHostKeyChecking no'
            echo "  IdentityFile $HOME/.ssh/deploy_key"
            echo '  User deploy'
          } > "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"
          echo "--- ssh config ---" && cat "$HOME/.ssh/config"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete --checksum \
            --exclude='.DS_Store' \
            -e "ssh -F $HOME/.ssh/config" \
            dist/ \
            "deploy@${{ vars.DEPLOY_TUNNEL_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
