name: Deploy to server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate data
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Install cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb
          cloudflared version

      - name: Configure SSH
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          {
            echo "Host ${{ vars.DEPLOY_TUNNEL_HOST }}"
            echo '  ProxyCommand cloudflared access ssh --hostname %h'
            echo '  StrictHostKeyChecking no'
            echo "  IdentityFile $HOME/.ssh/deploy_key"
            echo '  User deploy'
          } > "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"
          echo "--- ssh config ---" && cat "$HOME/.ssh/config"

      - name: Deploy via rsync (atomic releases dir)
        env:
          RELEASE_ID: ${{ github.sha }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_HOST: ${{ vars.DEPLOY_TUNNEL_HOST }}
        run: |
          set -euo pipefail
          REMOTE="deploy@${DEPLOY_HOST}"
          RELEASES_DIR="${DEPLOY_PATH}/releases"
          NEW_RELEASE="${RELEASES_DIR}/${RELEASE_ID}"

          ssh -F "$HOME/.ssh/config" "${DEPLOY_HOST}" "mkdir -p '${NEW_RELEASE}'"

          rsync -avz --delete --checksum \
            --exclude='.DS_Store' \
            -e "ssh -F $HOME/.ssh/config" \
            dist/ \
            "${REMOTE}:${NEW_RELEASE}/"

          # Atomic swap of the 'current' symlink, then prune old releases (keep last 5).
          ssh -F "$HOME/.ssh/config" "${DEPLOY_HOST}" bash -s <<EOF
          set -euo pipefail
          ln -sfn '${NEW_RELEASE}' '${DEPLOY_PATH}/current.new'
          mv -Tf '${DEPLOY_PATH}/current.new' '${DEPLOY_PATH}/current'
          ls -1dt '${RELEASES_DIR}'/*/ 2>/dev/null | tail -n +6 | xargs -r rm -rf
          echo "Active release: \$(readlink '${DEPLOY_PATH}/current')"
          EOF

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
