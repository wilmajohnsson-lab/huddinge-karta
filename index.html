<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Huddinge Karta</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;background:#111;overscroll-behavior:none;font-family:'Inter',sans-serif}

/* ══ SHELL ══ */
#app{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:row;
  background:#f6f6f6;
}

/* ══ SIDE PANEL (desktop left column) ══ */
#sidePanel{
  display:none;
  flex-direction:column;
  width:400px;flex-shrink:0;
  background:#f8f8f8;
  border-right:.5px solid rgba(0,0,0,.08);
  position:relative;z-index:50;
  overflow:hidden;
}
@media(min-width:768px){ #sidePanel{display:flex} }

.sp-head{
  padding:calc(env(safe-area-inset-top,0px) + 16px) 16px 14px;
  background:#f8f8f8;
  flex-shrink:0;
}
.sp-search-row{display:flex;gap:8px;margin-bottom:12px}
.sp-search{
  flex:1;height:48px;display:flex;align-items:center;gap:8px;
  padding:0 14px;border-radius:40px;border:.5px solid rgba(0,0,0,.12);
  background:#fff;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:rgba(0,0,0,.4);
}
.sp-search svg{opacity:.3;flex-shrink:0}
.sp-search span{flex:1;text-align:left;white-space:nowrap;overflow:hidden}
.sp-filter-btn{
  width:48px;height:48px;flex-shrink:0;
  background:#fff;border-radius:40px;border:.5px solid rgba(0,0,0,.12);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .15s;
}
.sp-filter-btn:hover{background:#f0f0f0}
.sp-filter-btn.active{background:#000}
.sp-filter-btn.active svg{stroke:#fff}
.sp-chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px 0 4px}
.sp-chips::-webkit-scrollbar{display:none}

.sp-body{flex:1;overflow-y:auto;padding:16px 16px 24px}
.sp-body::-webkit-scrollbar{display:none}
.sp-section{margin-bottom:20px}
.sp-section-title{font-size:16px;font-weight:600;color:#000;margin-bottom:10px}
.sp-card{
  display:flex;gap:12px;background:#fff;border-radius:14px;
  overflow:hidden;cursor:pointer;margin-bottom:10px;
  box-shadow:0 1px 8px rgba(0,0,0,.07);transition:transform .12s;
}
.sp-card:active,.sp-card:hover{transform:scale(.99)}
.sp-card-img{width:88px;height:88px;object-fit:cover;flex-shrink:0;background:#e8e8e8}
.sp-card-body{padding:10px 12px 10px 0;flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between}
.sp-card-title{font-size:15px;font-weight:600;color:#000;line-height:1.2}
.sp-card-desc{font-size:13px;color:rgba(0,0,0,.55);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.meta-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(0,0,0,.07);border-radius:8px;padding:3px 7px;font-size:12px;font-weight:500;color:#000;white-space:nowrap}
.meta-tag svg{width:12px;height:12px;opacity:.55;flex-shrink:0}
.free-badge{display:inline-flex;align-items:center;padding:3px 7px;border-radius:8px;font-size:12px;font-weight:600;background:rgba(52,199,89,.15);color:#1a7a38}

/* active card in side panel (desktop) */
#spActiveCard{
  display:none;
  flex-direction:column;
  flex:1;overflow:hidden;
}
.sac-img{width:100%;height:200px;object-fit:cover;cursor:pointer;background:#ddd;flex-shrink:0}
.sac-body{padding:16px;flex:1;overflow-y:auto}
.sac-title{font-size:20px;font-weight:700;color:#000;line-height:1.2;margin-bottom:4px;cursor:pointer}
.sac-desc{font-size:14px;color:rgba(0,0,0,.6);margin-bottom:14px}
.sac-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sac-btns{display:flex;gap:8px;padding:0 16px 24px;flex-shrink:0}

/* ══ MAP AREA ══ */
#mapWrap{flex:1;position:relative;overflow:hidden;min-width:0}
#map{position:absolute;inset:0}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}

/* ══ MOBILE TOP BAR ══ */
#topBar{
  position:absolute;top:0;left:0;right:0;z-index:100;
  padding:calc(env(safe-area-inset-top,44px) + 12px) 16px 20px;
  background:linear-gradient(to bottom,rgba(0,0,0,.22) 0%,rgba(0,0,0,.06) 65%,transparent 100%);
  pointer-events:none;
}
#topBar>*{pointer-events:auto}
@media(min-width:768px){#topBar{display:none}}

.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-pill{
  flex:1;min-width:0;height:56px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 16px;
  background:rgba(255,255,255,.4);backdrop-filter:blur(11px);-webkit-backdrop-filter:blur(11px);
  border-radius:40px;border:none;
  box-shadow:0 8px 25px rgba(0,0,0,.10);
  cursor:pointer;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:rgba(0,0,0,.4);
}
.search-pill svg{flex-shrink:0;opacity:.32}
.search-pill span{flex:1;text-align:left;white-space:nowrap;overflow:hidden}
.filter-btn{
  width:56px;height:56px;flex-shrink:0;
  background:rgba(255,255,255,.4);backdrop-filter:blur(11px);-webkit-backdrop-filter:blur(11px);
  border-radius:40px;border:none;
  box-shadow:0 8px 25px rgba(0,0,0,.10);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .15s;
}
.filter-btn.active{background:rgba(0,0,0,.8)}
.filter-btn.active svg{stroke:#fff}

/* ══ CHIPS (shared) ══ */
.chips{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:2px 0 6px}
.chips::-webkit-scrollbar,.sp-chips::-webkit-scrollbar{display:none}
.chip{
  display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px 0 9px;
  border-radius:40px;border:none;
  font-family:'Inter',sans-serif;font-size:15px;font-weight:500;white-space:nowrap;flex-shrink:0;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  transition:opacity .18s,background .18s;cursor:pointer;
}
.chip svg{width:18px;height:18px;flex-shrink:0}
.chip-event{background:rgba(209,96,23,.22);color:#bf5917}
.chip-konst{background:rgba(71,193,206,.22);color:#068a99}
.chip-motes{background:rgba(209,66,142,.22);color:#c0136f}
.chip-musik{background:rgba(248,216,75,.28);color:#c3a523}
.chip-event.chip-on{background:rgba(209,96,23,.88);color:#fff}
.chip-konst.chip-on{background:rgba(6,138,153,.88);color:#fff}
.chip-motes.chip-on{background:rgba(192,19,111,.88);color:#fff}
.chip-musik.chip-on{background:rgba(185,155,25,.92);color:#fff}
.chip-on svg{stroke:#fff!important}
.chip.chip-dim{opacity:.38}
.chip-x{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;margin-left:2px;background:rgba(255,255,255,.28);border-radius:50%;font-size:14px;line-height:1;flex-shrink:0}
/* Desktop chips use different base style */
@media(min-width:768px){
  .chip{height:32px;font-size:14px;backdrop-filter:none;-webkit-backdrop-filter:none}
  .chip-event{background:rgba(209,96,23,.18)}
  .chip-konst{background:rgba(71,193,206,.18)}
  .chip-motes{background:rgba(209,66,142,.18)}
  .chip-musik{background:rgba(248,216,75,.22)}
}

/* ══ MARKERS ══ */
.mpin{position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s}
.mpin:hover{transform:scale(1.08)}
.mpin-tail{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(45deg);background:white;border-radius:80px 80px 4px 80px;box-shadow:0 6px 12px rgba(0,0,0,.12),0 16px 32px rgba(0,0,0,.10)}
.mpin-circle{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;border-radius:50%}
.mpin-circle svg{width:24px;height:24px}
.mpin-sm .mpin-tail{width:44.3px;height:44.3px}
.mpin-sm .mpin-circle{width:40px;height:40px}
.mpin-lg .mpin-tail{width:61.9px;height:61.9px}
.mpin-lg .mpin-circle{width:56px;height:56px}
.user-dot{width:26px;height:26px;border-radius:50%;background:white;box-shadow:0 4px 8px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center}
.user-dot-inner{width:18px;height:18px;border-radius:50%;background:#357af6}

/* ══ MOBILE BOTTOM SHEET ══ */
#sheet{position:absolute;left:0;right:0;bottom:0;z-index:200;transition:transform .38s cubic-bezier(.32,.94,.6,1)}
@media(min-width:768px){#sheet{display:none}}
#sheetCard{background:rgba(255,255,255,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:32px 32px 40px 40px;box-shadow:0 -2px 40px rgba(0,0,0,.08)}
.sheet-handle-wrap{padding:12px 0 4px;display:flex;justify-content:center;user-select:none;touch-action:none;-webkit-user-select:none}
.sheet-handle{width:88px;height:5px;background:rgba(0,0,0,.18);border-radius:10px}
.sheet-body{padding:0 16px calc(env(safe-area-inset-bottom,0px) + 36px);overflow-y:auto;max-height:72vh;overflow-x:hidden;padding-top:4px}
.sheet-body::-webkit-scrollbar{display:none}
.sheet-hdr{display:flex;align-items:center;gap:10px;padding:8px 0 16px}
.sheet-hdr-icon{width:40px;height:40px;flex-shrink:0;border-radius:50%;background:rgba(0,132,154,.18);display:flex;align-items:center;justify-content:center}
.sheet-hdr-icon svg{width:24px;height:24px}
.sheet-hdr-title{font-size:18px;font-weight:600;color:#000}
.sheet-hdr-sub{font-size:14px;font-weight:500;color:rgba(0,0,0,.45);margin-top:1px}
.section{margin-bottom:24px}
.section-title{font-size:18px;font-weight:600;color:#000;margin-bottom:10px}
.h-scroll-wrap{margin-left:-16px;margin-right:-16px}
.h-scroll{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:4px 16px 16px}
.h-scroll::-webkit-scrollbar{display:none}
.ecard{width:200px;flex-shrink:0;background:#fff;border-radius:16px;overflow:hidden;transition:transform .15s;box-shadow:0 2px 14px rgba(0,0,0,.10)}
.ecard:active{transform:scale(.97)}
.ecard-img{width:100%;height:116px;object-fit:cover;display:block;background:#e8e8e8}
.ecard-body{padding:10px 10px 12px}
.ecard-title{font-size:15px;font-weight:600;color:#000;line-height:1.2;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ecard-desc{font-size:13px;color:rgba(0,0,0,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.ecard-meta{display:flex;gap:5px;flex-direction:column}

/* ══ MOBILE ACTIVE CARD ══ */
#activeCard{
  position:absolute;left:16px;right:16px;
  bottom:calc(env(safe-area-inset-bottom,0px) + 16px);
  z-index:250;
  background:rgba(255,255,255,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:32px 32px 40px 40px;
  box-shadow:0 8px 16px rgba(0,0,0,.07),0 4px 8px rgba(0,0,0,.07);
  padding:8px;
  transform:translateY(calc(100% + 40px));
  transition:transform .38s cubic-bezier(.32,.94,.6,1);
  touch-action:none;user-select:none;-webkit-user-select:none;
}
#activeCard.visible{transform:translateY(0)}
@media(min-width:768px){#activeCard{display:none}}
.ac-img{width:100%;height:128px;object-fit:cover;border-radius:24px;display:block;background:#ddd;transition:opacity .15s}
.ac-img:active{opacity:.85}
.ac-body{padding:12px 8px 8px}
.ac-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ac-title{font-size:15px;font-weight:600;color:#000;line-height:1.2}
.ac-title:active{opacity:.7}
.ac-desc{font-size:13px;color:rgba(0,0,0,.7);margin-top:2px}
.ac-logo{width:24px;height:24px;border-radius:50%;background:#e00;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:white;flex-shrink:0;margin-left:8px}
.ac-meta{display:flex;gap:8px;margin-bottom:14px;flex-direction:column}
.ac-btns{display:flex;gap:6px}
.btn-ghost{flex:1;padding:16px 8px;border-radius:56px;background:rgba(70,70,70,.1);border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;color:#000;cursor:pointer}
.btn-dark{flex:1;padding:16px 8px;border-radius:56px;background:#000;border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;color:#fff;cursor:pointer}

/* ══ SEARCH SCREEN ══ */
#searchScreen{
  position:absolute;inset:0;z-index:400;background:#fff;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.94,.6,1);
}
#searchScreen.visible{transform:translateY(0)}
.srch-top{padding:calc(env(safe-area-inset-top,44px) + 12px) 16px 16px;background:#f8f8f8;border-bottom:.5px solid rgba(0,0,0,.08)}
.srch-row{display:flex;gap:10px;align-items:center}
.srch-input-pill{flex:1;height:48px;display:flex;align-items:center;gap:8px;padding:0 14px;background:#fff;border-radius:40px;border:.5px solid rgba(0,0,0,.14)}
.srch-input-pill input{flex:1;border:none;outline:none;background:transparent;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:#000}
.srch-input-pill input::placeholder{color:rgba(0,0,0,.4)}
.srch-input-pill svg{opacity:.3;flex-shrink:0}
.srch-cancel{background:none;border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:#000;cursor:pointer;white-space:nowrap;padding:0 4px;opacity:.7}
.srch-results{padding:16px;overflow-y:auto;height:calc(100% - 100px);scrollbar-width:none}
.srch-results::-webkit-scrollbar{display:none}
.srch-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.09);margin-bottom:10px;display:flex;transition:transform .12s}
.srch-card:active{transform:scale(.98)}
.srch-card-img{width:96px;height:96px;object-fit:cover;flex-shrink:0;background:#e8e8e8}
.srch-card-body{padding:12px;flex:1;min-width:0}
.srch-card-title{font-size:15px;font-weight:600;color:#000;margin-bottom:2px}
.srch-card-desc{font-size:13px;color:rgba(0,0,0,.6);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srch-card-cat{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600}
.srch-empty{padding:60px 16px;text-align:center;color:rgba(0,0,0,.4);font-size:15px}

/* ══ DETAIL SCREEN ══ */
#detailScreen{
  position:absolute;inset:0;z-index:500;background:#f6f6f6;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.32,.94,.6,1);
  overflow-y:auto;
}
#detailScreen::-webkit-scrollbar{display:none}
#detailScreen.visible{transform:translateX(0)}
.det-hero{width:100%;height:300px;object-fit:cover;display:block;background:#ddd}
@media(min-width:768px){.det-hero{height:240px}}
.det-back{
  position:fixed;top:calc(env(safe-area-inset-top,44px) + 12px);left:16px;z-index:10;
  display:flex;align-items:center;gap:6px;padding:6px 12px 6px 8px;
  background:rgba(255,255,255,.2);backdrop-filter:blur(11px);-webkit-backdrop-filter:blur(11px);
  border-radius:40px;border:none;cursor:pointer;
  box-shadow:0 8px 25px rgba(0,0,0,.10);
  font-family:'Inter',sans-serif;font-size:15px;font-weight:500;color:#fff;
}
.det-back svg{width:18px;height:18px}
.det-card{background:#f6f6f6;border-radius:32px 32px 0 0;margin-top:-40px;position:relative;z-index:1;padding:24px 16px 140px}
.det-org-logo{width:32px;height:32px;border-radius:50%;margin:0 auto 12px;display:block;background:#e00}
.det-title{font-size:24px;font-weight:600;color:#000;text-align:center;line-height:1.2;margin-bottom:8px}
.det-subtitle{font-size:13px;color:rgba(0,0,0,.7);text-align:center;margin-bottom:20px}
.det-stats{display:flex;border:.5px solid rgba(0,0,0,.1);border-radius:12px;overflow:hidden;margin-bottom:20px}
.det-stat{flex:1;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;border-right:.5px solid rgba(0,0,0,.1)}
.det-stat:last-child{border-right:none}
.det-stat-icon{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center}
.det-stat-icon svg{width:20px;height:20px}
.det-stat-val{font-size:12px;font-weight:600;color:#000;text-align:center;line-height:1.3}
.det-desc{font-size:14px;color:rgba(0,0,0,.8);line-height:1.7;margin-bottom:24px}
.det-map-label{font-size:13px;color:rgba(0,0,0,.7);font-weight:500;margin-bottom:8px}
.det-map{width:100%;height:180px;border-radius:16px;overflow:hidden;margin-bottom:12px;background:#e8e8e8}
.det-addr-name{font-size:20px;font-weight:600;color:#000;margin-bottom:4px}
.det-addr-street{font-size:13px;color:rgba(0,0,0,.7);display:flex;align-items:center;gap:4px;margin-bottom:24px}
.det-divider{height:.5px;background:rgba(0,0,0,.1);margin-bottom:16px}
.det-host{display:flex;align-items:center;gap:16px;margin-bottom:8px}
.det-host-logo{width:56px;height:56px;border-radius:50%;background:#e00;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.det-host-name{font-size:20px;font-weight:600;color:#000}
.det-host-since{font-size:13px;color:rgba(0,0,0,.7);margin-top:4px}
.det-bottom{
  position:fixed;bottom:0;left:0;right:0;
  padding:16px 16px calc(env(safe-area-inset-bottom,0px) + 16px);
  background:linear-gradient(to top,rgba(255,255,255,.97) 60%,transparent);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:none;
}
.det-bottom.visible{display:block}
.det-bottom-row{display:flex;gap:6px}

/* ══ FILTER PANEL ══ */
#filterBg{position:absolute;inset:0;z-index:600;background:rgba(0,0,0,0);transition:background .25s;pointer-events:none}
#filterPanel{
  position:absolute;top:0;right:0;bottom:0;z-index:601;
  width:min(360px,92vw);
  background:#f8f8f8;
  transform:translateX(100%);
  transition:transform .32s cubic-bezier(.32,.94,.6,1);
  display:flex;flex-direction:column;
  box-shadow:-8px 0 40px rgba(0,0,0,.12);
}
#filterPanel.open{transform:translateX(0)}
.fp-head{
  padding:calc(env(safe-area-inset-top,44px) + 12px) 20px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:.5px solid rgba(0,0,0,.09);flex-shrink:0;
}
.fp-title{font-size:18px;font-weight:700;color:#000}
.fp-close{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.08);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fp-body{flex:1;overflow-y:auto;padding:20px;scrollbar-width:none}
.fp-body::-webkit-scrollbar{display:none}
.fp-section{margin-bottom:24px}
.fp-section-title{font-size:13px;font-weight:600;color:rgba(0,0,0,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
/* Toggle */
.fp-toggle-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.fp-toggle-label{display:flex;flex-direction:column;gap:2px}
.fp-toggle-label span:first-child{font-size:16px;font-weight:600;color:#000}
.fp-toggle-label span:last-child{font-size:13px;color:rgba(0,0,0,.5)}
.toggle-sw{position:relative;width:51px;height:31px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0}
.toggle-track{
  position:absolute;inset:0;border-radius:31px;
  background:rgba(0,0,0,.15);cursor:pointer;transition:background .2s;
}
.toggle-track::after{
  content:'';position:absolute;top:2px;left:2px;
  width:27px;height:27px;border-radius:50%;background:#fff;

];

// ── STATE ─────────────────────────────────────────────────────────
let map, leafMarkers={}, activeCardId=null, collapsed=false, detailMapInstance=null;
let selectedCat=null;
const filterState={free:false,orgs:new Set(),areas:new Set()};

function isDesktop(){ return window.innerWidth>=768; }

// ── MAP ───────────────────────────────────────────────────────────
const BOUNDS=L.latLngBounds([59.08,17.73],[59.34,18.24]);
function initMap(){
  map=L.map('map',{center:[59.218,17.978],zoom:13,minZoom:11,maxZoom:16,maxBounds:BOUNDS,maxBoundsViscosity:1,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
  const ui=L.divIcon({html:`<div class="user-dot"><div class="user-dot-inner"></div></div>`,className:'',iconSize:[26,26],iconAnchor:[13,13]});
  L.marker([59.2195,17.9490],{icon:ui,interactive:false}).addTo(map);
  ITEMS.forEach(addMarker);
  map.on('click',()=>{ dismissActiveCard(); });
  // Invalidate size when panel opens/closes
  window.addEventListener('resize',()=>{ map.invalidateSize(); });
}
function mHtml(cat,big){
  const sz=big?'mpin-lg':'mpin-sm', wt=big?87.6:62.7, p=big?'16px':'8px';
  return `<div class="mpin ${sz}" style="width:${wt}px;height:${wt}px"><div class="mpin-tail"></div><div class="mpin-circle" style="background:${CAT_COLOR[cat]};padding:${p}">${CAT_SVG_W[cat]}</div></div>`;
}
function addMarker(item){
  const big=activeCardId===item.id, sz=big?87.6:62.7;
  const icon=L.divIcon({html:mHtml(item.cat,big),className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz]});
  const m=L.marker([item.lat,item.lng],{icon}).addTo(map);
  m.on('click',e=>{ L.DomEvent.stopPropagation(e); showActiveCard(item.id); });
  leafMarkers[item.id]=m;
}
function refreshMarker(id){
  const m=leafMarkers[id]; if(!m)return;
  const item=ITEMS.find(x=>x.id===id);
  const big=activeCardId===id, sz=big?87.6:62.7;
  m.setIcon(L.divIcon({html:mHtml(item.cat,big),className:'',iconSize:[sz,sz],iconAnchor:[sz/2,sz]}));
}

// ── FILTER LOGIC ─────────────────────────────────────────────────
function getVisible(){
  return ITEMS.filter(i=>{
    if(selectedCat && i.cat!==selectedCat) return false;
    if(filterState.free && !i.free) return false;
    if(filterState.orgs.size>0 && !filterState.orgs.has(i.host)) return false;
    if(filterState.areas.size>0 && !filterState.areas.has(i.area)) return false;
    return true;
  });
}
function applyFilters(){
  filterState.free=document.getElementById('freeToggle').checked;
  const vis=getVisible();
  ITEMS.forEach(item=>{
    const m=leafMarkers[item.id]; if(!m)return;
    const show=vis.some(v=>v.id===item.id);
    show?(!map.hasLayer(m)&&map.addLayer(m)):(map.hasLayer(m)&&map.removeLayer(m));
  });
  renderContent();
  updateFilterBtnState();
}
function updateFilterBtnState(){
  const active=filterState.free||filterState.orgs.size>0||filterState.areas.size>0;
  document.getElementById('mFilterBtn')?.classList.toggle('active',active);
  document.getElementById('spFilterBtn')?.classList.toggle('active',active);
}
function resetFilters(){
  filterState.free=false; filterState.orgs.clear(); filterState.areas.clear();
  document.getElementById('freeToggle').checked=false;
  document.querySelectorAll('#fpOrgs .fp-chip, #fpAreas .fp-chip').forEach(c=>c.classList.remove('on'));
  applyFilters();
}
function toggleFpChip(el,set,val){
  if(set.has(val)){ set.delete(val); el.classList.remove('on'); }
  else{ set.add(val); el.classList.add('on'); }
  applyFilters();
}
function initFilterChips(){
  const orgsEl=document.getElementById('fpOrgs');
  ORGS_LIST.forEach(o=>{
    const b=document.createElement('button');
    b.className='fp-chip'; b.textContent=o;
    b.onclick=()=>toggleFpChip(b,filterState.orgs,o);
    orgsEl.appendChild(b);
  });
  const areasEl=document.getElementById('fpAreas');
  AREAS_LIST.forEach(a=>{
    const b=document.createElement('button');
    b.className='fp-chip'; b.textContent=a.name;
    b.onclick=()=>toggleFpChip(b,filterState.areas,a.id);
    areasEl.appendChild(b);
  });
}
function toggleFilter(){
  const fp=document.getElementById('filterPanel');
  fp.classList.contains('open')?closeFilter():openFilter();
}
function openFilter(){
  const fp=document.getElementById('filterPanel');
  const bg=document.getElementById('filterBg');
  fp.classList.add('open');
  bg.style.pointerEvents='auto';
  bg.style.background='rgba(0,0,0,.15)';
}
function closeFilter(){
  document.getElementById('filterPanel').classList.remove('open');
  const bg=document.getElementById('filterBg');
  bg.style.background='rgba(0,0,0,0)';
  bg.style.pointerEvents='none';
}

// ── CATEGORY CHIPS ────────────────────────────────────────────────
function selectCat(cat){
  selectedCat=(selectedCat===cat)?null:cat;
  renderChips(); applyFilters();
}
function chipHtml(cat,containerId){
  const isOn=selectedCat===cat, isDim=selectedCat!==null&&!isOn;
  return `<button class="chip chip-${cat}${isOn?' chip-on':''}${isDim?' chip-dim':''}" onclick="selectCat('${cat}')">
    ${CHIP_SVGS[cat]}${CAT_LABEL[cat]}
    ${isOn?`<span class="chip-x" onclick="event.stopPropagation();selectCat('${cat}')">×</span>`:''}
  </button>`;
}
function renderChips(){
  const html=['event','konst','motes','musik'].map(c=>chipHtml(c)).join('');
  const m=document.getElementById('chips'); if(m) m.innerHTML=html;
  const s=document.getElementById('spChips'); if(s) s.innerHTML=html.replace(/onclick="selectCat/g,"onclick=\"selectCat");
}

// ── CONTENT RENDERING ─────────────────────────────────────────────
function metaHtml(item){
  return `<div class="meta-tag">${S.clock}${item.date} · ${item.time.split('–')[0]}</div>
          <div class="meta-tag">${S.pin}${item.loc}</div>
          ${item.free?'<span class="free-badge">Gratis</span>':''}`;
}
// Mobile horizontal card
function eCardHtml(item){
  return `<div class="ecard" onclick="showActiveCard(${item.id})">
    <img class="ecard-img" src="${item.img}" alt="${item.name}" loading="lazy">
    <div class="ecard-body">
      <div class="ecard-title">${item.name}</div>
      <div class="ecard-desc">${item.desc}</div>
      <div class="ecard-meta">${metaHtml(item)}</div>
    </div>
  </div>`;
}
// Desktop vertical card
function spCardHtml(item){
  return `<div class="sp-card" onclick="showActiveCard(${item.id})">
    <img class="sp-card-img" src="${item.img}" alt="${item.name}" loading="lazy">
    <div class="sp-card-body">
      <div>
        <div class="sp-card-title">${item.name}</div>
        <div class="sp-card-desc">${item.desc}</div>
      </div>
      <div class="sp-card-meta">${metaHtml(item)}</div>
    </div>
  </div>`;
}
function renderContent(){
  const vis=getVisible();
  // Mobile sheet
  const byCat=cat=>vis.filter(i=>i.cat===cat);
  const secHtml=(title,items)=>items.length?`<div class="section"><div class="section-title">${title}</div><div class="h-scroll-wrap"><div class="h-scroll">${items.map(eCardHtml).join('')}</div></div></div>`:'';
  const shEl=document.getElementById('sheetContent');
  if(shEl) shEl.innerHTML=secHtml('Events',byCat('event'))+secHtml('Konst',byCat('konst'))+secHtml('Mötesplatser',byCat('motes'))+secHtml('Musik',byCat('musik'));
  // Desktop sidebar
  const spEl=document.getElementById('spBody');
  if(spEl){
    const spSecHtml=(title,items)=>items.length?`<div class="sp-section"><div class="sp-section-title">${title}</div>${items.map(spCardHtml).join('')}</div>`:'';
    spEl.innerHTML=spSecHtml('Events',byCat('event'))+spSecHtml('Konst',byCat('konst'))+spSecHtml('Mötesplatser',byCat('motes'))+spSecHtml('Musik',byCat('musik'));
  }
}

// ── ACTIVE CARD ───────────────────────────────────────────────────
function showActiveCard(id){
  const prev=activeCardId; activeCardId=id;
  if(prev&&prev!==id) refreshMarker(prev);
  refreshMarker(id);
  const item=ITEMS.find(x=>x.id===id);
  const meta=`<div class="meta-tag">${S.clock}${item.date} · ${item.time.split('–')[0]}</div><div class="meta-tag">${S.pin}${item.loc}</div>${item.free?'<span class="free-badge">Gratis</span>':''}`;
  if(isDesktop()){
    // Show in side panel
    document.getElementById('sacImg').src=item.img;
    document.getElementById('sacTitle').textContent=item.name;
    document.getElementById('sacDesc').textContent=item.desc;
    document.getElementById('sacMeta').innerHTML=meta;
    document.getElementById('sacFlyBtn').onclick=()=>openMapsSheet(item);
    document.getElementById('sacJoinBtn').onclick=()=>openEventUrl(item);
    document.getElementById('spBody').style.display='none';
    document.getElementById('spActiveCard').style.display='flex';
  } else {
    // Mobile bottom card
    document.getElementById('acImg').src=item.img;
    document.getElementById('acTitle').textContent=item.name;
    document.getElementById('acDesc').textContent=item.desc;
    document.getElementById('acMeta').innerHTML=meta;
    document.getElementById('acFlyBtn').onclick=()=>openMapsSheet(item);
    document.getElementById('acJoinBtn').onclick=()=>openEventUrl(item);
    document.getElementById('detailScreen').querySelector('.det-back').onclick=closeDetail;
    hideSheet();
    document.getElementById('activeCard').classList.add('visible');
  }
  flyToItem(item);
}
function dismissActiveCard(){
  const prev=activeCardId; activeCardId=null;
  if(prev) refreshMarker(prev);
  if(isDesktop()){
    document.getElementById('spActiveCard').style.display='none';
    document.getElementById('spBody').style.display='';
  } else {
    const ac=document.getElementById('activeCard');
    const offY=ac.offsetHeight+40;
    ac.style.transition='transform .32s cubic-bezier(.4,0,.6,1)';
    ac.style.transform=`translateY(${offY}px)`;
    ac.addEventListener('transitionend',function done(){
      ac.removeEventListener('transitionend',done);
      ac.classList.remove('visible');
      ac.style.transition=''; ac.style.transform='';
      expandSheet();
    },{once:true});
  }
}

// ── FLY TO ────────────────────────────────────────────────────────
function flyToItem(item){
  map.flyTo([item.lat,item.lng],15,{duration:0.7,easeLinearity:0.5});
  map.once('moveend',function(){
    const pt=map.latLngToContainerPoint([item.lat,item.lng]);
    const mapH=document.getElementById('mapWrap').offsetHeight;
    let topBarH=160, bottomH=isDesktop()?40:380;
    const targetY=topBarH+(mapH-topBarH-bottomH)/2;
    const panY=Math.round(pt.y-targetY);
    if(Math.abs(panY)>8) map.panBy([0,panY],{animate:true,duration:0.25});
  });
}

// ── SHEET (mobile) ────────────────────────────────────────────────
const PEEK=230;
function hideSheet(){ const h=document.getElementById('sheetCard').offsetHeight+40; document.getElementById('sheet').style.transform=`translateY(${h}px)`; collapsed=true; }
function collapseSheet(){ const h=document.getElementById('sheetCard').offsetHeight; document.getElementById('sheet').style.transform=`translateY(${h-PEEK}px)`; collapsed=true; }
function expandSheet(){ document.getElementById('sheet').style.transform='translateY(0)'; collapsed=false; }

let dY0,dT0,dDrag=false;
function setupSheetDrag(){
  const hw=document.getElementById('handleWrap');
  const sh=document.getElementById('sheet');
  function onStart(y){
    if(document.getElementById('activeCard').classList.contains('visible'))return;
    dDrag=true; dY0=y;
    dT0=collapsed?document.getElementById('sheetCard').offsetHeight-PEEK:0;
    sh.style.transition='none';
  }
  function onMove(y){ if(!dDrag)return; sh.style.transform=`translateY(${Math.max(0,dT0+y-dY0)}px)`; }
  function onEnd(y){
    if(!dDrag)return; dDrag=false; sh.style.transition='';
    const dy=y-dY0;
    if(dy>50) collapseSheet(); else if(dy<-50) expandSheet(); else collapsed?collapseSheet():expandSheet();
  }
  hw.addEventListener('touchstart',e=>{ e.preventDefault(); onStart(e.touches[0].clientY); },{passive:false});
  document.addEventListener('touchmove',e=>{ if(dDrag){ e.preventDefault(); onMove(e.touches[0].clientY); } },{passive:false});
  document.addEventListener('touchend',e=>{ if(dDrag) onEnd(e.changedTouches[0].clientY); },{passive:true});
  hw.addEventListener('pointerdown',e=>{ if(e.pointerType==='touch')return; onStart(e.clientY); hw.setPointerCapture(e.pointerId); });
  hw.addEventListener('pointermove',e=>{ if(e.pointerType==='touch')return; onMove(e.clientY); });
  hw.addEventListener('pointerup',e=>{ if(e.pointerType==='touch')return; onEnd(e.clientY); });
}

// ── ACTIVE CARD SWIPE DISMISS ────────────────────────────────────
function setupActiveCardSwipe(){
  const ac=document.getElementById('activeCard');
  let acY0=0,acDrag=false;
  ac.addEventListener('touchstart',e=>{ if(!ac.classList.contains('visible'))return; acDrag=true; acY0=e.touches[0].clientY; ac.style.transition='none'; },{passive:true});
  ac.addEventListener('touchmove',e=>{ if(!acDrag)return; const dy=e.touches[0].clientY-acY0; if(dy>0){e.preventDefault();ac.style.transform=`translateY(${dy}px)`;} },{passive:false});
  ac.addEventListener('touchend',e=>{
    if(!acDrag)return; acDrag=false;
    const dy=e.changedTouches[0].clientY-acY0;
    if(dy>60){
      const offY=ac.offsetHeight+40;
      ac.style.transition='transform .32s cubic-bezier(.4,0,.6,1)';
      ac.style.transform=`translateY(${offY}px)`;
      ac.addEventListener('transitionend',function done(){
        ac.removeEventListener('transitionend',done);
        ac.classList.remove('visible'); ac.style.transition=''; ac.style.transform='';
        const prev=activeCardId; activeCardId=null; if(prev) refreshMarker(prev);
        expandSheet();
      },{once:true});
    } else { ac.style.transition='transform .3s cubic-bezier(.32,.94,.6,1)'; ac.style.transform='translateY(0)'; }
  },{passive:true});
}

// ── SEARCH ────────────────────────────────────────────────────────
function openSearch(){ document.getElementById('searchScreen').classList.add('visible'); setTimeout(()=>document.getElementById('searchInput').focus(),300); onSearch(''); }
function closeSearch(){ document.getElementById('searchScreen').classList.remove('visible'); document.getElementById('searchInput').value=''; }
function onSearch(q){
  const res=document.getElementById('searchResults');
  const term=q.trim().toLowerCase();
  const hits=term?ITEMS.filter(i=>i.name.toLowerCase().includes(term)||i.loc.toLowerCase().includes(term)):ITEMS;
  if(!hits.length){res.innerHTML=`<div class="srch-empty">Inga resultat för "${q}"</div>`;return;}
  res.innerHTML=hits.map(item=>`
    <div class="srch-card" onclick="closeSearch();showActiveCard(${item.id})">
      <img class="srch-card-img" src="${item.img}" alt="${item.name}" loading="lazy">
      <div class="srch-card-body">
        <div class="srch-card-title">${item.name}</div>
        <div class="srch-card-desc">${item.desc}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span class="srch-card-cat" style="background:${CAT_BG[item.cat]};color:${CAT_COLOR[item.cat]}">${CAT_LABEL[item.cat]}</span>
          ${item.free?'<span class="free-badge">Gratis</span>':''}
        </div>
      </div>
    </div>`).join('');
}

// ── DETAIL ────────────────────────────────────────────────────────
function openDetail(id){
  const item=ITEMS.find(x=>x.id===id); if(!item)return;
  const col=CAT_COLOR[item.cat], bg=CAT_BG[item.cat], lbl=CAT_LABEL[item.cat];
  const icoFn=(c)=>CAT_SVG_W[item.cat].replace(/stroke="white"/g,`stroke="${c}"`);
  document.getElementById('detInner').innerHTML=`
    <img class="det-hero" src="${item.img}" alt="${item.name}">
    <div class="det-card">
      <div style="text-align:center">
        <div style="display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:40px;background:${bg};color:${col};font-size:13px;font-weight:600;margin:0 0 10px">${icoFn(col)}${lbl}</div>
        <div class="det-title">${item.name}</div>
        <div class="det-subtitle">${item.desc}</div>
      </div>
      <div class="det-stats">
        <div class="det-stat"><div class="det-stat-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="#333" stroke-width="1.8"/><path d="M8 2v4M16 2v4M3 10h18" stroke="#333" stroke-width="1.8" stroke-linecap="round"/></svg></div><div class="det-stat-val">${item.date}</div></div>
        <div class="det-stat"><div class="det-stat-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z" stroke="#333" stroke-width="1.8" stroke-linejoin="round"/></svg></div><div class="det-stat-val">${item.loc}</div></div>
        <div class="det-stat"><div class="det-stat-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#333" stroke-width="1.8"/><path d="M12 7v5l3 2" stroke="#333" stroke-width="1.8" stroke-linecap="round"/></svg></div><div class="det-stat-val">${item.time}</div></div>
      </div>
      <p class="det-desc">${item.longDesc}</p>
      <div class="det-map-label">Var det är</div>
      <div class="det-map" id="detMapEl"></div>
      <div class="det-addr-name">${item.loc}</div>
      <div class="det-addr-street">${item.addr}</div>
      <div class="det-divider"></div>
      <div class="det-host">
        <div class="det-host-logo">ABF</div>
        <div><div class="det-host-name">Hosted av ${item.host}</div><div class="det-host-since">Arrangör i Huddinge Kommun</div></div>
      </div>
    </div>`;
  document.getElementById('detFlyBtn').onclick=()=>openMapsSheet(item);
  document.getElementById('detJoinBtn').onclick=()=>openEventUrl(item);
  document.getElementById('detBackBtn').onclick=closeDetail;
  document.getElementById('detBottom').classList.add('visible');
  const ds=document.getElementById('detailScreen'); ds.classList.add('visible'); ds.scrollTop=0;
  if(detailMapInstance){detailMapInstance.remove();detailMapInstance=null;}
  setTimeout(()=>{
    const el=document.getElementById('detMapEl'); if(!el)return;
    detailMapInstance=L.map(el,{center:[item.lat,item.lng],zoom:15,zoomControl:false,attributionControl:false,interactive:false,dragging:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd'}).addTo(detailMapInstance);
    const pi=L.divIcon({html:`<div style="width:14px;height:14px;border-radius:50%;background:${col};border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>`,className:'',iconSize:[14,14],iconAnchor:[7,7]});
    L.marker([item.lat,item.lng],{icon:pi}).addTo(detailMapInstance);
    setTimeout(()=>detailMapInstance.invalidateSize(),50);
  },100);
}
function closeDetail(){
  document.getElementById('detailScreen').classList.remove('visible');
  document.getElementById('detBottom').classList.remove('visible');
}

// ── ACTION SHEET ─────────────────────────────────────────────────
function showActionSheet(opts){
  const bg=document.getElementById('actionSheetBg');
  const el=document.getElementById('actionSheet');
  document.getElementById('actionSheetOptions').innerHTML=opts.map((o,i)=>`
    <button onclick="actionSheetTap(${i})" style="width:100%;padding:17px 16px;background:none;border:none;border-top:${i>0?'0.5px solid rgba(0,0,0,.15)':'none'};font-family:'Inter',sans-serif;font-size:17px;font-weight:${o.bold?'600':'400'};color:${o.bold?'#000':'#007aff'};text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px">
      ${o.label}${o.subtitle?`<span style="font-size:13px;font-weight:400;color:rgba(0,0,0,.45)">${o.subtitle}</span>`:''}
    </button>`).join('');
  el._opts=opts;
  bg.style.pointerEvents='auto'; bg.style.background='rgba(0,0,0,.15)';
  el.style.transform='translateY(0)';
}
function closeActionSheet(){
  document.getElementById('actionSheetBg').style.cssText='background:rgba(0,0,0,0);pointer-events:none';
  document.getElementById('actionSheet').style.transform='translateY(calc(100% + 12px))';
}
function actionSheetTap(i){ const o=document.getElementById('actionSheet')._opts[i]; closeActionSheet(); if(o?.action) o.action(); }
function openMapsSheet(item){
  showActionSheet([
    {label:'🗺️ Öppna i Apple Kartor',action:()=>window.open(`https://maps.apple.com/?daddr=${item.lat},${item.lng}&dirflg=d`,'_blank')},
    {label:'📍 Öppna i Google Maps',action:()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lng}`,'_blank')}
  ]);
}
function openEventUrl(item){
  const host=item.url.replace(/https?:\/\//,'').replace(/\/.*/,'');
  showActionSheet([{label:`Öppna ${host}`,subtitle:`Mer info om ${item.name}`,bold:true,action:()=>window.open(item.url,'_blank')}]);
}

// ── BOOT ─────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  initMap(); initFilterChips(); renderChips(); renderContent();
  setupSheetDrag(); setupActiveCardSwipe();
  requestAnimationFrame(()=>{
    document.getElementById('sheet').style.transition='none';
    collapseSheet();
    requestAnimationFrame(()=>{ document.getElementById('sheet').style.transition=''; });
  });
});
</script>
