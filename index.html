<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Huddinge Karta</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/css/styles.css">
<!-- NOTE: app.js lives in public/js/ so Vite copies it verbatim to dist/. -->
<!-- Move to type="module" + npm Leaflet in Phase C for full bundling. -->
</head>
<body>
<div id="app">

  <!-- ══ SIDE PANEL (desktop) ══ -->
  <div id="sidePanel">
    <div class="sp-head">
      <div class="sp-search-row">
        <button class="sp-search" onclick="openSearch()">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#000" stroke-width="1.8"/><path d="M17 17l-3.5-3.5" stroke="#000" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span>Sök efter område eller händelse...</span>
        </button>
        <button class="sp-filter-btn" id="spFilterBtn" onclick="toggleFilter()">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M6 10h8M9 15h2" stroke="#000" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="sp-chips chips" id="spChips"></div>
    </div>
    <!-- normal list view -->
    <div class="sp-body" id="spBody"></div>
    <!-- active card view (shown on marker click) -->
    <div id="spActiveCard">
      <img class="sac-img" id="sacImg" src="" alt="" onclick="openDetail(activeCardId)">
      <div class="sac-body">
        <div style="margin-bottom:12px">
          <div class="sac-title" id="sacTitle" onclick="openDetail(activeCardId)"></div>
          <div class="sac-desc" id="sacDesc"></div>
        </div>
        <div class="sac-meta" id="sacMeta"></div>
        <div style="display:flex;gap:6px;margin-top:16px">
          <button class="btn-ghost" id="sacFlyBtn">Hitta hit</button>
          <button class="btn-dark" id="sacJoinBtn">Ansök att gå med</button>
        </div>
        <div style="margin-top:16px;padding-top:16px;border-top:.5px solid rgba(0,0,0,.08)">
          <button onclick="dismissActiveCard()" style="width:100%;padding:12px;border-radius:12px;background:none;border:none;font-family:'Inter',sans-serif;font-size:14px;color:rgba(0,0,0,.45);cursor:pointer">← Tillbaka till listan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ MAP AREA ══ -->
  <div id="mapWrap">
    <div id="map"></div>

    <!-- Mobile top bar -->
    <div id="topBar">
      <div class="search-row">
        <button class="search-pill" onclick="openSearch()">
          <span>Sök efter område eller händelse...</span>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#000" stroke-width="1.8"/><path d="M17 17l-3.5-3.5" stroke="#000" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <button class="filter-btn" id="mFilterBtn" onclick="toggleFilter()">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M6 10h8M9 15h2" stroke="#000" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="chips" id="chips"></div>
    </div>

    <!-- Mobile bottom sheet -->
    <div id="sheet">
      <div id="sheetCard">
        <div class="sheet-handle-wrap" id="handleWrap"><div class="sheet-handle"></div></div>
        <div class="sheet-body">
          <div class="sheet-hdr">
            <div class="sheet-hdr-icon">
              <svg viewBox="0 0 24 24" fill="none"><path d="M16 18H19c1.105 0 2-.895 2-2V7c0-1.105-.895-2-2-2h-7M16 18l1 3M16 18H8M8 18H5c-1.105 0-2-.895-2-2V7c0-1.105.895-2 2-2h7M8 18l-1 3M12 18v2M12 5V3" stroke="#068a99" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div><div class="sheet-hdr-title">Vad händer idag?</div><div class="sheet-hdr-sub">10 nya events denna vecka!</div></div>
          </div>
          <div id="sheetContent"></div>
        </div>
      </div>
    </div>

    <!-- Mobile active card -->
    <div id="activeCard">
      <img class="ac-img" id="acImg" src="" alt="" onclick="openDetail(activeCardId)">
      <div class="ac-body">
        <div class="ac-top">
          <div><div class="ac-title" id="acTitle" onclick="openDetail(activeCardId)"></div><div class="ac-desc" id="acDesc"></div></div>
          <div class="ac-logo">ABF</div>
        </div>
        <div class="ac-meta" id="acMeta"></div>
        <div class="ac-btns">
          <button class="btn-ghost" id="acFlyBtn">Hitta hit</button>
          <button class="btn-dark" id="acJoinBtn">Ansök att gå med</button>
        </div>
      </div>
    </div>

    <!-- Search screen -->
    <div id="searchScreen">
      <div class="srch-top">
        <div class="srch-row">
          <div class="srch-input-pill">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="#000" stroke-width="1.8"/><path d="M17 17l-3.5-3.5" stroke="#000" stroke-width="1.8" stroke-linecap="round"/></svg>
            <input type="text" id="searchInput" placeholder="Sök efter område eller händelse..." autocomplete="off" oninput="onSearch(this.value)">
          </div>
          <button class="srch-cancel" onclick="closeSearch()">Avbryt</button>
        </div>
      </div>
      <div class="srch-results" id="searchResults"></div>
    </div>

    <!-- Detail screen -->
    <div id="detailScreen">
      <div id="detailCard" style="position:relative">
        <button class="det-back" id="detBackBtn">
          <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12l7 7M5 12l7-7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Tillbaka
        </button>
        <div id="detInner"></div>
      </div>
      <div class="det-bottom" id="detBottom">
        <div class="det-bottom-row">
          <button class="btn-ghost" id="detFlyBtn">Hitta hit</button>
          <button class="btn-dark" id="detJoinBtn">Ansök att gå med</button>
        </div>
      </div>
    </div>

    <!-- Filter panel -->
    <div id="filterBg" onclick="closeFilter()"></div>
    <div id="filterPanel">
      <div class="fp-head">
        <span class="fp-title">Filter</span>
        <button class="fp-close" onclick="closeFilter()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"><path d="M1 1l12 12M13 1L1 13"/></svg>
        </button>
      </div>
      <div class="fp-body">
        <!-- Gratis toggle -->
        <div class="fp-section">
          <div class="fp-section-title">Pris</div>
          <div class="fp-toggle-row">
            <div class="fp-toggle-label">
              <span>Gratis</span>
              <span>Visa endast gratis evenemang</span>
            </div>
            <label class="toggle-sw">
              <input type="checkbox" id="freeToggle" onchange="applyFilters()">
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>
        <!-- Organisatör -->
        <div class="fp-section">
          <div class="fp-section-title">Organisatör</div>
          <div class="fp-chips" id="fpOrgs"></div>
        </div>
        <!-- Område -->
        <div class="fp-section">
          <div class="fp-section-title">Område</div>
          <div class="fp-chips" id="fpAreas"></div>
        </div>
      </div>
      <div class="fp-footer">
        <button class="fp-reset" onclick="resetFilters()">Rensa</button>
        <button class="fp-apply" onclick="closeFilter()">Visa resultat</button>
      </div>
    </div>

    <!-- Action sheet -->
    <div id="actionSheetBg" onclick="closeActionSheet()"></div>
    <div id="actionSheet">
      <div id="actionSheetOptions"></div>
      <button class="as-cancel" onclick="closeActionSheet()">Avbryt</button>
    </div>
  </div><!-- #mapWrap -->

</div><!-- #app -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
