# nginx configuration for Huddinge Karta
# Place this file in /etc/nginx/sites-available/huddinge-karta and symlink to sites-enabled
# HTTP -> HTTPS redirection + HTTPS server block with TLS and security headers, caching and SPA routing

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR-DOMAIN.se;

    # Redirect plain HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR-DOMAIN.se;

    # TLS cert paths (placeholders for certbot / Let's Encrypt)
    # After obtaining certs with certbot these files will exist at the paths below
    ssl_certificate /etc/letsencrypt/live/YOUR-DOMAIN.se/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR-DOMAIN.se/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Only allow modern TLS versions
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Web root and default file
    # Points at the 'current' symlink that the deploy workflow swaps atomically
    # to /var/www/huddinge-karta/releases/<sha>. Symlinks are followed transparently.
    root /var/www/huddinge-karta/current;
    index index.html;

    # --- Security headers (applied to all responses) ---
    # Content Security Policy: tighten sources for scripts, styles, fonts, images and connections
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.basemaps.cartocdn.com https://images.unsplash.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # HSTS: only sent over HTTPS; tells browsers to use HTTPS for the domain for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- Logging & performance tunables ---
    access_log /var/log/nginx/huddinge-karta.access.log;
    error_log /var/log/nginx/huddinge-karta.error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # --- gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    # Keep these types; add others if needed
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    # --- Cache rules ---
    # Long-term immutable cache for hashed build assets (Vite outputs hashed filenames)
    location /assets/ {
        # Serve static assets directly
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Short cache for dynamic-ish JSON data
    location /data/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300" always;
    }

    # index.html must always be fetched fresh for SPA updates
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store" always;
    }

    # Favicons and manifest - short cache
    location = /favicon.svg {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
    }
    location = /manifest.json {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # SPA routing: serve files if present, otherwise fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files and dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
